alias: "EV Manual Boost Controller"
mode: single
triggers:
  - trigger: state
    entity_id: input_boolean.ev_override_boost
    to: "on"
    id: "boost_activated"
  - trigger: state
    entity_id: input_boolean.ev_override_boost
    to: "off"
    id: "boost_deactivated"
  - trigger: state
    entity_id: input_number.ev_boost_duration
    id: "duration_changed"

actions:
  - choose:
      - conditions:
          - condition: trigger
            id: "boost_activated"
        sequence:
          - action: text.set_value
            target:
              entity_id: text.evcharger2_charge_mode
            data:
              value: >
                {% set start = now().strftime('%H:%M') %}
                {% set hours = states('input_number.ev_boost_duration') | float(0) %}
                {% set end = (now() + timedelta(hours=hours)).strftime('%H:%M') %}
                {{ '{"m":2,"dt":1,"ss":"' ~ start ~ '","se":"' ~ end ~ '"}' }}

      - conditions:
          - condition: trigger
            id: "duration_changed"
          - condition: state
            entity_id: input_boolean.ev_override_boost
            state: "on"
        sequence:
          - action: text.set_value
            target:
              entity_id: text.evcharger2_charge_mode
            data:
              value: >
                {% set current_json = states('text.evcharger2_charge_mode') | from_json %}
                {% set hours = states('input_number.ev_boost_duration') | float(0) %}
                {% set new_end = (as_datetime(today_at(current_json.ss)) + timedelta(hours=hours)).strftime('%H:%M') %}
                {{ {'m':2, 'dt':1, 'ss':current_json.ss, 'se':new_end} | to_json }}

      - conditions:
          - condition: trigger
            id: "boost_deactivated"
        sequence:
          - action: automation.trigger
            target:
              entity_id: automation.solar_ev_adjust